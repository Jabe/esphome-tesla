name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  structure:
    name: Package layout and branding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Run structural tests
        run: python3 tests/test_package_layout.py

  ci:
    name: Config ${{ matrix.file }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file:
          - tesla-ble.local.yml
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Mock secrets.yaml from example
        run: cp secrets.yaml.example secrets.yaml
      - name: Get ESPHome version
        id: get_esphome_version
        run: |
          esphome_version=$(grep esphome requirements.txt | cut -d'=' -f3)
          echo "esphome_version=$esphome_version" >> "$GITHUB_OUTPUT"
      - name: Validate ESPHome configuration
        uses: esphome/build-action@v7.3.0
        with:
          yaml-file: ${{ matrix.file }}
          version: ${{ steps.get_esphome_version.outputs.esphome_version }}
