# Optional Ethernet (LAN8720, e.g. Olimex ESP32-PoE). Override pins via package vars.
substitutions:
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk_pin: GPIO17
  clk_mode: CLK_OUT
  phy_addr: "0"
  power_pin: GPIO12

ethernet:
  type: LAN8720
  mdc_pin: ${mdc_pin}
  mdio_pin: ${mdio_pin}
  clk:
    pin: ${clk_pin}
    mode: ${clk_mode}
  phy_addr: ${phy_addr}
  power_pin: ${power_pin}
