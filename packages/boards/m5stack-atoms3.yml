# M5Stack Atom S3 board package (pins + status LED / button).
substitutions:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB

esp32:
  board: $board
  variant: $variant
  flash_size: $flash_size
  framework:
    type: esp-idf

# Board specific entities
output:
  - platform: template
    id: status_output
    type: binary
    write_action:
    - if:
        condition:
          lambda: return (state);
        then:
          - light.turn_on:
              id: led
              brightness: 70%
              red: 100%
              green: 0%
              blue: 0%
        else:
          - light.turn_off: led

light:
  - platform: status_led
    output: status_output
    name: "Status Led"
    entity_category: diagnostic

  # G35=RGB WS2812C-2020
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: 35
    num_leds: 4
    chipset: ws2812
    id: led
    name: "Led"
    entity_category: diagnostic

# G41=Button
binary_sensor:
  - platform: gpio
    name: Button
    entity_category: diagnostic
    pin:
      number: GPIO41
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_off: 10ms
