substitutions:
  device_description: Interact with Tesla vehicles over BLE using ESPHome and Home Assistant
  board: "esp32dev"   # defaults
  variant: "ESP32"
  flash_size: "4MB"
  BLE_library: "https://github.com/PedroKTFC/tesla-ble.git"
  tesla_ble_component: "github://Jabe/esphome-tesla-ble"
  ble_presence_timeout: 30s

esphome:
  project:
    name: PedroKTFC.esphome-tesla-ble
    version: "2026.2.0"
  name: ${device_name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
  libraries:
    - TeslaBLE=${BLE_library}

esp32:
  board: $board
  variant: $variant
  flash_size: $flash_size
  framework:
    type: esp-idf

external_components:
  - source: $tesla_ble_component
    components:
      - tesla_ble_vehicle
      - tesla_ble_listener
      - tesla_fleet_api_server

logger:
  level: INFO

ota:
  platform: esphome
  password: !secret ota_password

ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk_mode: GPIO17_OUT
  phy_addr: 0
  power_pin: GPIO12
