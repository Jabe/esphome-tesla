# Minimal core: esphome identity, logger, api, ota, component sources.
# No network, no vehicle entities, no Fleet API — pick those as separate packages.
substitutions:
  device_description: Interact with Tesla vehicles over BLE using ESPHome and Home Assistant
  # TeslaBLE C++ library dependency (historical upstream library; not this repo)
  BLE_library: "https://github.com/PedroKTFC/tesla-ble.git"
  tesla_ble_component: "github://Jabe/esphome-tesla"
  # How long ESPHome caches the components above. For testing a moving ref
  # (e.g. @main), set this to 0s in your node config — or pin a commit SHA
  # in tesla_ble_component instead.
  tesla_ble_component_refresh: 1d
  # OTA auth is off by default; set from your node config (e.g. !secret) to enable.
  ota_password: ""

esphome:
  project:
    name: Jabe.esphome-tesla
    version: "1.0.0"
  name: ${device_name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
  libraries:
    - TeslaBLE=${BLE_library}

external_components:
  - source: $tesla_ble_component
    refresh: ${tesla_ble_component_refresh}
    components:
      - tesla_ble_vehicle
      - tesla_ble_listener
      - tesla_fleet_api_server

logger:
  level: INFO

api:

ota:
  platform: esphome
  password: ${ota_password}
