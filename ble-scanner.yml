# Standalone BLE MAC scanner (no vehicle packages required).
esphome:
  name: ble-scanner
  project:
    name: Jabe.esphome-tesla-ble
    version: "2026.2.0"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

ota:
  - platform: esphome

api:
  encryption:
    key: !secret api_encryption_key

# Pick Wi-Fi or Ethernet for the scanner board:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
# ethernet:
#   type: LAN8720
#   mdc_pin: GPIO23
#   mdio_pin: GPIO18
#   clk_mode: GPIO17_OUT
#   phy_addr: 0
#   power_pin: GPIO12

esp32_ble_tracker:
  on_ble_advertise:
    then:
      - lambda: |-
          std::string name = x.get_name();
          bool is_tesla_format = false;

          if (name.rfind("Tesla ", 0) == 0 && name.length() == 12) {
            is_tesla_format = true;
            for (int i = 6; i < 12; ++i) {
              if (!isdigit(name[i])) {
                is_tesla_format = false;
                break;
              }
            }
          }

          if (is_tesla_format ||
              (!name.empty() && name.front() == 'S' && name.back() == 'C') && name.length() == 18) {
            ESP_LOGI("ble_adv", "Tesla found: MAC=%s Name=%s",
              x.address_str().c_str(), name.c_str());
          }
