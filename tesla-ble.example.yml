# Example node config — explicit package shopping list (see packages/ layout).
# Always start from this file. Pick Wi-Fi *or* Ethernet, and optionally Fleet API.
substitutions:
  friendly_name: Tesla BLE
  device_name: tesla-ble
  device_description: Tesla BLE
  ble_mac_address: !secret ble_mac_address
  tesla_vin: !secret tesla_vin
  charging_amps_max: "32"
  # ota_password: !secret ota_password  # uncomment to enable OTA auth
  # Only needed with connectivity/wifi.yml:
  # wifi_ssid: !secret wifi_ssid
  # wifi_password: !secret wifi_password
  # Override board defaults only if needed (defaults come from the board package):
  # board: "esp32dev"
  # variant: "ESP32"

api:
  encryption:
    key: !secret api_encryption_key

# ---------------------------------------------------------------------------
# Packages (map form). Pin a ref and set refresh for reproducible remote builds.
# For local development from a checkout, use tesla-ble.local.yml instead.
# ---------------------------------------------------------------------------
packages:
  base:
    url: github://Jabe/esphome-tesla
    file: packages/core/base.yml
    ref: main
    refresh: 1d

  board:
    url: github://Jabe/esphome-tesla
    file: packages/boards/esp32dev.yml
    ref: main
    refresh: 1d
  # Alternatives:
  # board: github://Jabe/esphome-tesla/packages/boards/m5stack-atoms3.yml@main
  # board: github://Jabe/esphome-tesla/packages/boards/m5stack-nanoc6.yml@main

  # Pick ONE network package:
  network:
    url: github://Jabe/esphome-tesla
    file: packages/connectivity/ethernet-lan8720.yml
    ref: main
    refresh: 1d
    # vars:   # optional pin overrides for non-default PoE boards
    #   mdc_pin: GPIO23
    #   mdio_pin: GPIO18
    #   clk_pin: GPIO17
    #   clk_mode: CLK_OUT
    #   power_pin: GPIO12
  # network: github://Jabe/esphome-tesla/packages/connectivity/wifi.yml@main

  ble_tracker:
    url: github://Jabe/esphome-tesla
    file: packages/core/ble_tracker.yml
    ref: main
    refresh: 1d

  diagnostics:
    url: github://Jabe/esphome-tesla
    file: packages/core/diagnostics.yml
    ref: main
    refresh: 1d

  vehicle:
    url: github://Jabe/esphome-tesla
    file: packages/features/vehicle.yml
    ref: main
    refresh: 1d

  # Optional: Fleet API HTTP mirror (evcc etc.)
  fleet_api:
    url: github://Jabe/esphome-tesla
    file: packages/features/fleet_api.yml
    ref: main
    refresh: 1d

  # Optional: scan for VIN BLE MAC (can run without vehicle package)
  # listener: github://Jabe/esphome-tesla/packages/features/listener.yml@main

  # Optional languages (extend entity names):
  # language: github://Jabe/esphome-tesla/packages/features/language_de.yml@main
  # language: github://Jabe/esphome-tesla/packages/features/language_hu.yml@main

# Top-level blocks deep-merge into the packages — no fork, no !extend needed.
# Example: esp-idf advanced options on top of the board package:
# esp32:
#   framework:
#     type: esp-idf
#     advanced:
#       minimum_chip_revision: "3.0"
#       sram1_as_iram: true

# Optional vehicle entity renames / poll overrides — uncomment tesla_ble_vehicle first:
# tesla_ble_vehicle:
#   odometer:
#     name: "Odometer"
#   update_interval: 10s
#   post_wake_poll_time: 300
#   poll_data_period: 60
#   poll_charging_period: 10
#   poll_asleep_period: 60
#   ble_disconnected_min_time: 300
#   fast_poll_if_unlocked: 0
